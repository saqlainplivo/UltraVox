<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outbound Dialer</title>
    <style>
        :root {
            color-scheme: light;
        }
        body {
            font-family: "Gill Sans", "Trebuchet MS", sans-serif;
            margin: 0;
            background: #f2f0ea;
            color: #1d1b16;
        }
        .wrap {
            max-width: 720px;
            margin: 6vh auto;
            padding: 32px;
            background: #fffaf2;
            border: 2px solid #1d1b16;
            box-shadow: 8px 8px 0 #1d1b16;
        }
        h1 {
            margin: 0 0 12px 0;
            font-size: 28px;
            letter-spacing: 0.3px;
        }
        p {
            margin: 0 0 20px 0;
            color: #3d3a33;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }
        input[type="tel"] {
            width: 100%;
            padding: 12px 14px;
            font-size: 16px;
            border: 2px solid #1d1b16;
            background: #fff;
            box-sizing: border-box;
        }
        button {
            margin-top: 14px;
            padding: 12px 16px;
            font-size: 16px;
            font-weight: 700;
            border: 2px solid #1d1b16;
            background: #ffdd57;
            cursor: pointer;
        }
        .status {
            margin-top: 16px;
            padding: 12px;
            border: 2px dashed #1d1b16;
            background: #fdf4c7;
            min-height: 22px;
            white-space: pre-wrap;
        }
        .hint {
            font-size: 13px;
            color: #5b564b;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <h1>Outbound Dialer</h1>
        <p>Enter a number to place an outbound call using the receptionist flow.</p>
        <form id="dialForm">
            <label for="toNumber">Phone Number</label>
            <input id="toNumber" name="to_number" type="tel" placeholder="+1234567890" required>
            <button type="submit">Dial</button>
        </form>
        <div class="hint">Make sure `PUBLIC_BASE_URL` points to your public tunnel URL.</div>
        <div id="status" class="status"></div>
    </div>

    <script>
        const form = document.getElementById("dialForm");
        const statusEl = document.getElementById("status");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            statusEl.textContent = "Dialing...";
            const formData = new FormData(form);
            try {
                const res = await fetch("/outbound-call", {
                    method: "POST",
                    body: formData,
                });
                let data = null;
                const contentType = res.headers.get("content-type") || "";
                if (contentType.includes("application/json")) {
                    data = await res.json();
                } else {
                    const text = await res.text();
                    throw new Error(`Non-JSON response (${res.status}): ${text.slice(0, 200)}`);
                }
                if (data.ok) {
                    statusEl.textContent = `Call started. UUID: ${data.call_uuid}`;
                } else {
                    statusEl.textContent = `Error: ${data.error || "Unknown error"}`;
                }
            } catch (err) {
                statusEl.textContent = `Error: ${err}`;
            }
        });
    </script>
</body>
</html>
